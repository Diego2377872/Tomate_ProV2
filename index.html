<body>
<div id="appRoot" class="pro-container"></div>

<script>
    // Configuración Supabase
    const DEFAULT_SUPABASE_URL = "https://updxutkajdpdkyritgxc.supabase.co";
    const DEFAULT_SUPABASE_ANON = "sb_publishable_J5RjpJ2TFydwv-5xJCiQkw_d3kBSeG4";

    if (!localStorage.getItem('tomate_supabase_url')) {
        localStorage.setItem('tomate_supabase_url', DEFAULT_SUPABASE_URL);
        localStorage.setItem('tomate_supabase_anon', DEFAULT_SUPABASE_ANON);
    }

    let supabaseClient = null;
    let currentUser = null;
    let currentMap = null;
    let currentMarker = null;
    let chartInstance = null;
    let registrosData = [];
    let markersLayer = null;
    let currentBaseLayer = null;
    let theme = localStorage.getItem('theme') || 'dark';

    let dbConfig = {
        url: localStorage.getItem('tomate_supabase_url'),
        anonKey: localStorage.getItem('tomate_supabase_anon')
    };

    // ========== OFFLINE STORAGE ==========
    const offlineStore = (() => {
        try {
            return localforage.createInstance({
                name: "TomatePRO",
                storeName: "pending_records"
            });
        } catch(e) {
            console.warn("localforage no disponible, usando localStorage fallback");
            return {
                setItem: (key, val) => { localStorage.setItem(key, JSON.stringify(val)); return Promise.resolve(); },
                getItem: (key) => Promise.resolve(JSON.parse(localStorage.getItem(key))),
                removeItem: (key) => { localStorage.removeItem(key); return Promise.resolve(); },
                keys: () => Promise.resolve(Object.keys(localStorage).filter(k => k.startsWith('pending_')))
            };
        }
    })();

    async function saveOffline(record) {
        record._sync_status = 'pending';
        record._created_at = new Date().toISOString();
        const key = `pending_${Date.now()}_${Math.random().toString(36).substr(2, 8)}`;
        await offlineStore.setItem(key, record);
        return { success: true, offline: true };
    }

    async function syncPendingRecords() {
        if (!supabaseClient || !currentUser) return;
        const keys = await offlineStore.keys();
        const pendingKeys = keys.filter(k => k.startsWith('pending_'));
        if (pendingKeys.length === 0) return;

        for (const key of pendingKeys) {
            const record = await offlineStore.getItem(key);
            if (record && record._sync_status === 'pending') {
                try {
                    const { _sync_status, _created_at, ...cleanRecord } = record;
                    cleanRecord.user_id = currentUser.id;
                    const { error } = await supabaseClient.from('tomate_registros').insert([cleanRecord]);
                    if (!error) {
                        await offlineStore.removeItem(key);
                        console.log(`Registro sincronizado: ${key}`);
                    } else {
                        console.error('Error al sincronizar:', error);
                        if (error.message.includes('JWT') || error.message.includes('auth')) {
                            await offlineStore.removeItem(key);
                        }
                    }
                } catch (err) {
                    console.error('Error de red al sincronizar:', err);
                }
            }
        }
        updatePendingCount();
        loadUserRegistros();
    }

    async function updatePendingCount() {
        try {
            const keys = await offlineStore.keys();
            const pending = keys.filter(k => k.startsWith('pending_')).length;
            const indicator = document.getElementById('offlineIndicator');
            const countSpan = document.getElementById('pendingCount');
            if (indicator) {
                if (pending > 0) {
                    indicator.style.display = 'inline-block';
                    countSpan.innerText = pending;
                } else {
                    indicator.style.display = 'none';
                }
            }
        } catch(e) { console.warn(e); }
    }

    window.addEventListener('online', () => {
        console.log('Conexión recuperada. Sincronizando...');
        syncPendingRecords();
    });

    // Listas de opciones
    const variedadesList = ["Santa Cruz", "Santa Clara", "Ravena", "Katana", "Tipo Cherry", "Jumbo", "Sahariana", "Caniati", "Otro"];
    const fenologiaList = [
        "Germinación (0–7 días)",
        "Plántula / Emergencia (7–20 días)",
        "Crecimiento Vegetativo (20–40 días)",
        "Inicio de Floración (30–50 días)",
        "Floración Plena (40–60 días)",
        "Cuajado de Frutos (50–70 días)",
        "Desarrollo de Fruto (60–90 días)",
        "Maduración (80–120 días)",
        "Senescencia (120+ días)"
    ];
    const riegoList = ["Goteo", "Aspersión", "Manual", "Otro"];
    const sistemaProductivoList = ["Caseta (Invernadero)", "Cielo Abierto", "Otro"];
    const tipoSueloList = ["Arcilloso", "Arenoso", "Franco", "Franco-arcilloso", "Franco-arenoso", "Limoso", "Otro"];
    const plagasCheck = ["Mosca blanca", "Trips", "Pulgón", "Minador", "Gusano cogollero","Palomilla","Ybytazo", "ácaros", "Otra"];
    const enfermedadesCheck = ["Mildiu", "Mbiru", "Septoriosis", "Vira Cabeza", "Tizon","Botrytis", "Fusarium", "Mancha Bacteriana", "Otra"];

    const colorPalette = ['#f4b942', '#2c7a4a', '#c44536', '#3a6b8f', '#f39c12', '#27ae60', '#e67e22', '#2980b9', '#8e44ad', '#16a085'];

    function translateSupabaseError(errorMessage) {
        if (!errorMessage) return "Error desconocido";
        const lowerMsg = errorMessage.toLowerCase();
        if (lowerMsg.includes("email rate limit exceeded")) {
            return "📧 Has alcanzado el límite de registros por hora. Espera unos minutos e intenta de nuevo.";
        }
        if (lowerMsg.includes("invalid login credentials")) {
            return "❌ Credenciales inválidas. Revisa tu email y contraseña.";
        }
        if (lowerMsg.includes("user already registered")) {
            return "📧 Este correo ya está registrado. Inicia sesión o usa una cuenta diferente.";
        }
        if (lowerMsg.includes("email not confirmed")) {
            return "⚠️ Debes confirmar tu correo electrónico antes de iniciar sesión. Revisa tu bandeja de entrada.";
        }
        if (lowerMsg.includes("password should be at least 6 characters")) {
            return "🔒 La contraseña debe tener al menos 6 caracteres.";
        }
        if (lowerMsg.includes("invalid email")) {
            return "📧 El formato del correo electrónico no es válido.";
        }
        if (lowerMsg.includes("network error")) {
            return "🌐 Error de red. Verifica tu conexión a Internet.";
        }
        return `⚠️ Error: ${errorMessage}`;
    }

    function applyTheme() {
        if (theme === 'light') {
            document.body.classList.add('light');
        } else {
            document.body.classList.remove('light');
        }
    }

    function toggleTheme() {
        theme = theme === 'dark' ? 'light' : 'dark';
        localStorage.setItem('theme', theme);
        applyTheme();
    }

    function renderApp() {
        applyTheme();
        const root = document.getElementById('appRoot');
        if (!dbConfig.url || !dbConfig.anonKey) {
            renderConfigPanel(root);
            return;
        }
        if (!supabaseClient) {
            try {
                supabaseClient = window.supabase.createClient(dbConfig.url, dbConfig.anonKey);
            } catch(e) {
                renderConfigPanel(root, "Error al inicializar cliente");
                return;
            }
        }
        checkAuthAndRender(root);
    }

    async function checkAuthAndRender(root) {
        if (!supabaseClient) return;
        const { data: { user }, error } = await supabaseClient.auth.getUser();
        if (user && !error) {
            currentUser = user;
            renderMainApp(root);
            loadUserRegistros();
            if (navigator.onLine) {
                syncPendingRecords();
            }
        } else {
            renderAuthScreen(root);
        }
    }

    function renderConfigPanel(root, errorMsg = '') {
        root.innerHTML = `
            <div class="config-panel">
                <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color:var(--accent-gold);"></i>
                <h2 style="margin:16px 0">🔌 Conectar a Supabase</h2>
                <p style="margin-bottom:20px;">Usando tus credenciales guardadas</p>
                <input type="text" id="supabaseUrl" value="${dbConfig.url}">
                <input type="text" id="supabaseAnon" value="${dbConfig.anonKey}">
                ${errorMsg ? `<p style="color:var(--accent-red);">${errorMsg}</p>` : ''}
                <button id="saveConfigBtn">Guardar y conectar</button>
            </div>
        `;
        document.getElementById('saveConfigBtn')?.addEventListener('click', () => {
            const newUrl = document.getElementById('supabaseUrl').value.trim();
            const newAnon = document.getElementById('supabaseAnon').value.trim();
            if (!newUrl || !newAnon) return;
            localStorage.setItem('tomate_supabase_url', newUrl);
            localStorage.setItem('tomate_supabase_anon', newAnon);
            dbConfig = { url: newUrl, anonKey: newAnon };
            supabaseClient = window.supabase.createClient(newUrl, newAnon);
            renderApp();
        });
    }

    function renderAuthScreen(root) {
        root.innerHTML = `
            <div style="max-width: 500px; margin: 40px auto;">
                <div class="premium-card" style="text-align:center;">
                    <i class="fas fa-tomato" style="font-size: 48px; color:var(--accent-gold);"></i>
                    <h2 style="margin:15px 0">Tomate PRO 🍅</h2>
                    <p>Accede con tu cuenta profesional</p>

    function initMap() {
        if (currentMap) currentMap.remove();
        currentMap = L.map('map').setView([-25.4, -57.5], 13);
        currentBaseLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>'
        }).addTo(currentMap);
        markersLayer = L.layerGroup().addTo(currentMap);
        currentMarker = null;

        const customControl = L.Control.extend({
            options: { position: 'topright' },
            onAdd: function(map) {
                const div = L.DomUtil.create('div', 'leaflet-control-custom');
                div.innerHTML = `
                    <a href="#" id="map-osm" title="OpenStreetMap"><i class="fas fa-globe"></i></a>
                    <a href="#" id="map-google" title="Google Híbrido"><i class="fas fa-map"></i></a>
                    <a href="#" id="map-esri" title="Esri Imagery"><i class="fas fa-satellite"></i></a>
                `;
                L.DomEvent.disableClickPropagation(div);
                return div;
            }
        });
        currentMap.addControl(new customControl());

        const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: 'OSM' });
        const googleHybrid = L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
            attribution: 'Google',
            maxZoom: 20
        });
        const esriImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri',
            maxZoom: 18
        });

        const setActiveStyle = (activeId) => {
            ['map-osm', 'map-google', 'map-esri'].forEach(id => {
                const el = document.getElementById(id);
                if (el) {
                    if (id === activeId) el.classList.add('active');
                    else el.classList.remove('active');
                }
            });
        };

        document.getElementById('map-osm')?.addEventListener('click', (e) => {
            e.preventDefault();
            currentMap.removeLayer(currentBaseLayer);
            currentBaseLayer = osmLayer.addTo(currentMap);
            setActiveStyle('map-osm');
        });
        document.getElementById('map-google')?.addEventListener('click', (e) => {
            e.preventDefault();
            currentMap.removeLayer(currentBaseLayer);
            currentBaseLayer = googleHybrid.addTo(currentMap);
            setActiveStyle('map-google');
        });
        document.getElementById('map-esri')?.addEventListener('click', (e) => {
            e.preventDefault();
            currentMap.removeLayer(currentBaseLayer);
            currentBaseLayer = esriImagery.addTo(currentMap);
            setActiveStyle('map-esri');
        });
        setActiveStyle('map-osm');

        currentMap.on('click', function(e) {
            setMarker(e.latlng.lat, e.latlng.lng);
        });
    }

    function setMarker(lat, lng) {
        if (currentMarker) currentMap.removeLayer(currentMarker);
        currentMarker = L.marker([lat, lng]).addTo(currentMap);
        document.getElementById('coords').value = `${lat},${lng}`;
        currentMap.setView([lat, lng], 14);
    }

    function clearMarker() {
        if (currentMarker) currentMap.removeLayer(currentMarker);
        currentMarker = null;
        document.getElementById('coords').value = '';
    }

        document.getElementById('uploadCsvBtn').addEventListener('click', async () => {
            const fileInput = document.getElementById('csvFile');
            const file = fileInput.files[0];
            if (!file) {
                alert("Selecciona un archivo CSV");
                return;
            }
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                complete: async (results) => {
                    const data = results.data;
                    const errors = [];
                    const toInsert = [];
                    for (const row of data) {
                        try {
                            if (!row.productor || !row.lat || !row.lng) {
                                errors.push(`Fila ${data.indexOf(row)+2}: faltan campos obligatorios (productor, lat, lng)`);
                                continue;
                            }
                            const lat = parseFloat(row.lat);
                            const lng = parseFloat(row.lng);
                            if (isNaN(lat) || isNaN(lng)) {
                                errors.push(`Fila ${data.indexOf(row)+2}: lat/lng inválidos`);
                                continue;
                            }
                            const plagas = row.plagas ? row.plagas.split(';').map(p => p.trim()).filter(p => p) : [];
                            const enfermedades = row.enfermedades ? row.enfermedades.split(';').map(e => e.trim()).filter(e => e) : [];
                            const analisisSuelo = row.analisis_suelo === 'si' ? true : false;
                            const payload = {
                                productor: row.productor,
                                ci: row.ci || null,
                                fecha: row.fecha || null,
                                fecha_siembra: row.fecha_siembra || null,
                                lat, lng,
                                sistema_productivo: row.sistema_productivo || null,
                                variedad: row.variedad || null,
                                fenologia: row.fenologia || null,
                                riego: row.riego || null,
                                num_plantas: row.num_plantas ? parseInt(row.num_plantas) : null,
                                marco_plantacion: row.marco_plantacion || null,
                                tipo_suelo: row.tipo_suelo || null,
                                ph: row.ph ? parseFloat(row.ph) : null,
                                materia_organica: row.materia_organica ? parseFloat(row.materia_organica) : null,
                                area: row.area ? parseFloat(row.area) : null,
                                rendimiento_estimado: row.rendimiento_estimado ? parseFloat(row.rendimiento_estimado) : null,
                                plagas,
                                enfermedades,
                                control_aplicado: row.control_aplicado || null,
                                notas: row.notas || null,
                                analisis_suelo: analisisSuelo,
                                user_id: currentUser.id,
                                recomendacion: generarRecomendacionPro(payload)
                            };
                            toInsert.push(payload);
                        } catch (err) {
                            errors.push(`Fila ${data.indexOf(row)+2}: error al procesar - ${err.message}`);
                        }
                    }
                    if (toInsert.length === 0) {
                        document.getElementById('batchResult').innerHTML = `<p style="color:var(--accent-gold);">No hay registros válidos para insertar. ${errors.join('<br>')}</p>`;
                        return;

                        updatePendingCount();
                        closeBatchModal();

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function generarRecomendacionPro(data) {
        let recs = [];
        const { fenologia, riego, variedad, plagas, enfermedades, tipo_suelo, ph, analisis_suelo } = data;
        if (fenologia && fenologia.includes('Floración')) recs.push("🌼 Aplicar fósforo y boro. Evitar estrés hídrico.");
        if (fenologia && fenologia.includes('Desarrollo de Fruto')) recs.push("🍅 Aumentar potasio y calcio para calidad del fruto.");
        if (riego === 'Manual') recs.push("💧 Considere implementar riego por goteo para eficiencia hídrica.");
        if (riego === 'Aspersión') recs.push("💨 Evite mojar el follaje en horas de sol para prevenir enfermedades.");
        if (variedad && variedad.toLowerCase().includes('cherry')) recs.push("🍒 Las variedades Cherry requieren tutoreo alto y podas regulares.");
        if (plagas && plagas.length) recs.push(`🐛 Plagas detectadas: ${plagas.join(', ')}. Monitorear y aplicar control integrado.`);
        if (enfermedades && enfermedades.length) recs.push(`🍄 Enfermedades: ${enfermedades.join(', ')}. Rotar fungicidas y mejorar ventilación.`);
        if (tipo_suelo && tipo_suelo.includes('Arcilloso')) recs.push("🌱 Suelo arcilloso: mejore drenaje con enmiendas orgánicas.");
        if (ph && (ph < 5.5 || ph > 7.5)) recs.push("🧪 El pH óptimo para tomate es 5.5-7.5. Considere corrección.");
        if (analisis_suelo === false) recs.push("🔬 Recomendamos realizar un análisis de suelo para ajustar fertilización.");
        if (recs.length === 0) recs.push("✅ Buenas prácticas. Continúe con monitoreo semanal.");
        return recs.slice(0, 6).join("\n");
    }

    async function loadUserRegistros() {
        if (!supabaseClient || !currentUser) return;
        const { data, error } = await supabaseClient
            .from('tomate_registros')
            .select('*')
            .eq('user_id', currentUser.id)
            .order('created_at', { ascending: false });
        if (error) {
            document.getElementById('registrosList').innerHTML = `<div class="empty-state">⚠️ Error: ${translateSupabaseError(error.message)}</div>`;
            return;
        }
        registrosData = data || [];
        renderRegistrosList(registrosData);
        const chartVar = document.getElementById('chartVariable')?.value || 'fenologia';
        const chartType = document.getElementById('chartType')?.value || 'pie';
        updateMiniChart(registrosData, chartVar, chartType);
        updateMapMarkers(registrosData);
    }

    function updateMapMarkers(registros) {
        if (!markersLayer) return;
        markersLayer.clearLayers();
        registros.forEach(reg => {
            if (reg.lat && reg.lng) {
                const marker = L.marker([reg.lat, reg.lng]);
                const popupContent = `
                    <b>${reg.productor || 'Productor'}</b><br>
                    ${reg.ci ? `CI: ${reg.ci}<br>` : ''}
                    <button onclick="window.openProducerModal('${reg.productor}')" style="background:#2c7a4a; color:white; border:none; padding:5px 10px; border-radius:20px; margin-top:5px; cursor:pointer;">
                        Ver finca
                    </button>
                `;
                marker.bindPopup(popupContent);
                markersLayer.addLayer(marker);
            }
        });
    }

    window.verEnMapa = (lat, lng) => {
        if (currentMap && lat && lng) {
            currentMap.setView([lat, lng], 16);
            if (currentMarker) currentMap.removeLayer(currentMarker);
            currentMarker = L.marker([lat, lng]).addTo(currentMap);
            document.getElementById('coords').value = `${lat},${lng}`;
        } else {
            alert("No se puede centrar el mapa");
        }
    };

    window.eliminarRegistro = async (id) => {
        if (!confirm("¿Eliminar este registro permanentemente?")) return;
        const { error } = await supabaseClient.from('tomate_registros').delete().eq('id', id).eq('user_id', currentUser.id);
        if (error) alert(translateSupabaseError(error.message));
        else loadUserRegistros();
    };

    function updateMiniChart(registros, variable, chartType = 'pie') {
        const canvas = document.getElementById('miniChart');
        if (!canvas) return;
        if (chartInstance) chartInstance.destroy();
        if (!registros.length) {
            canvas.style.display = 'none';
            return;
        }
        canvas.style.display = 'block';
        const counts = {};
        registros.forEach(r => {
            let val = r[variable] || 'No especificado';
            if (variable === 'analisis_suelo') val = val ? 'Sí' : 'No';
            counts[val] = (counts[val] || 0) + 1;
        });
        const labels = Object.keys(counts);
        const data = labels.map(l => counts[l]);
        const ctx = canvas.getContext('2d');
        const textColor = getComputedStyle(document.body).getPropertyValue('--text-primary');
        
        const barColors = data.map((_, idx) => colorPalette[idx % colorPalette.length]);
        
        if (chartType === 'pie') {
            chartInstance = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: colorPalette.slice(0, labels.length),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { 
                            position: 'bottom', 
                            labels: { font: { size: 11, color: textColor } }
                        },
                        tooltip: { bodyFont: { size: 11 } }
                    }
                }
            });
        } else if (chartType === 'bar') {
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Cantidad de registros',
                        data: data,
                        backgroundColor: barColors,
                        borderColor: barColors.map(c => c),
                        borderWidth: 1,
                        borderRadius: 8
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { 
                            position: 'top', 
                            labels: { font: { size: 11, color: textColor } }
                        },
                        tooltip: { bodyFont: { size: 11 } }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: { stepSize: 1, color: textColor },
                            grid: { color: 'rgba(255,255,255,0.1)' }
                        },
                        x: {
                            ticks: { color: textColor, maxRotation: 45, minRotation: 30 },
                            grid: { display: false }
                        }
                    }
                }
            });
        }
    }

    function exportToExcel(registros) {
        if (!registros.length) {
            alert("No hay datos para exportar");
            return;
        }
        const worksheetData = registros.map(reg => ({
            'Productor': reg.productor,
            'CI': reg.ci,
            'Fecha Monitoreo': reg.fecha,
            'Fecha Siembra': reg.fecha_siembra,
            'Latitud': reg.lat,
            'Longitud': reg.lng,
            'Sistema Productivo': reg.sistema_productivo,
            'Variedad': reg.variedad,
            'Fenología': reg.fenologia,
            'Riego': reg.riego,
            'N° Plantas': reg.num_plantas,
            'Marco Plantación': reg.marco_plantacion,
            'Tipo Suelo': reg.tipo_suelo,
            'pH': reg.ph,
            'Materia Orgánica (%)': reg.materia_organica,
            'área (m2)': reg.area,
            'Rendimiento (kg)': reg.rendimiento_estimado,
            'Análisis Suelo': reg.analisis_suelo ? 'Sí' : 'No',
            'Plagas': reg.plagas ? reg.plagas.join('; ') : '',
            'Enfermedades': reg.enfermedades ? reg.enfermedades.join('; ') : '',
            'Control Aplicado': reg.control_aplicado,
            'Notas': reg.notas,
            'Recomendación IA': reg.recomendacion,
            'Fecha Registro': reg.created_at
        }));
        const ws = XLSX.utils.json_to_sheet(worksheetData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'Monitoreos');
        XLSX.writeFile(wb, `tomate_pro_${new Date().toISOString().slice(0,19)}.xlsx`);
    }

    // Nueva función: Exportar a GeoJSON
    function exportToGeoJSON(registros) {
        if (!registros.length) {
            alert("No hay datos para exportar a GeoJSON");
            return;
        }
        const validPoints = registros.filter(r => r.lat && r.lng && !isNaN(r.lat) && !isNaN(r.lng));
        if (!validPoints.length) {
            alert("No hay puntos válidos con coordenadas para exportar");
            return;
        }
        const features = validPoints.map(reg => {
            // Selecciona los atributos que se incluirán en el GeoJSON
            const properties = {
                productor: reg.productor || "",
                ci: reg.ci || "",
                fecha_monitoreo: reg.fecha || "",
                fecha_siembra: reg.fecha_siembra || "",
                sistema_productivo: reg.sistema_productivo || "",
                variedad: reg.variedad || "",
                fenologia: reg.fenologia || "",
                riego: reg.riego || "",
                num_plantas: reg.num_plantas || 0,
                marco_plantacion: reg.marco_plantacion || "",
                tipo_suelo: reg.tipo_suelo || "",
                ph: reg.ph || null,
                materia_organica: reg.materia_organica || null,
                area_m2: reg.area || null,
                rendimiento_kg: reg.rendimiento_estimado || null,
                analisis_suelo: reg.analisis_suelo ? "Sí" : "No",
                plagas: reg.plagas ? reg.plagas.join("; ") : "",
                enfermedades: reg.enfermedades ? reg.enfermedades.join("; ") : "",
                control_aplicado: reg.control_aplicado || "",
                notas: reg.notas || "",
                recomendacion_ia: reg.recomendacion || "",
                created_at: reg.created_at || ""
            };
            return {
                type: "Feature",
                geometry: {
                    type: "Point",
                    coordinates: [reg.lng, reg.lat]   // GeoJSON usa [longitud, latitud]
                },
                properties: properties
            };
        });
        const geojson = {
            type: "FeatureCollection",
            features: features
        };
        const jsonStr = JSON.stringify(geojson, null, 2);
        const blob = new Blob([jsonStr], { type: "application/geo+json" });
        saveAs(blob, `tomate_pro_${new Date().toISOString().slice(0,19)}.geojson`);
        alert(`🗺️ Exportados ${features.length} puntos a GeoJSON`);
    }

    renderApp();
</script>
